# Babel message-extraction config (INTERNATIONALIZATION-STANDARD §3/§4).
#
# ledger's end-user-facing, natural-language surface is the accessible browse
# server + contribution form (ledger.render, ledger.server, ledger.contribute),
# whose fixed strings resolve through the gettext seam in ledger.i18n. Every such
# string is a literal _()/ngettext() call in ledger.i18n; this config tells
# `pybabel extract` to scan the package's Python sources for those calls.
# Operator/developer output (the CLI in ledger.cli, moderation, and any log or
# status text) is English-only by design and carries no _() calls, so nothing is
# extracted from it.
[python: **.py]
