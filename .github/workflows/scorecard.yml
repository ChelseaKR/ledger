name: scorecard

# OSSF Scorecard (SEC-35/36/37): a public, re-checked supply-chain security
# posture score, computed on every push to main and weekly on a schedule so drift
# (a newly-unpinned action, a maintainer who goes quiet, a dropped branch
# protection) is caught even with no code change. Results upload to GitHub code
# scanning (SARIF) and — this is a public repo — to the public Scorecard API,
# which is what backs the README badge.
on:
  push:
    branches: [main]
  schedule:
    - cron: "23 5 * * 3" # Wednesdays, 05:23 UTC
  workflow_dispatch:

# Least privilege: read-only by default; the analysis job widens only the two
# scopes Scorecard's own action needs.
permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # keyless-sign the published results (Sigstore)
      contents: read
      actions: read # Scorecard's "Token-Permissions" / workflow checks read run history
    steps:
      # Harden-Runner (SEC-04): audit mode first, see ci.yml for the rollout note.
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif

      - name: Upload SARIF as a workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
