name: release

# Reproducibility/agility (REL-08): a maintainer supplies a signed annotated
# stable SemVer tag to the reviewed workflow on main. Nobody publishes by running
# a script on a laptop. Least privilege: the workflow holds `contents: read` by
# default; each job widens only the token/OIDC scope it actually needs, and the
# PyPI publish step never sees a long-lived API token at all (PyPI Trusted
# Publishing, REL-13 — OIDC-issued, workflow-scoped, expires in minutes).
#
# One-time manual setup this workflow depends on (tracked in docs/ROADMAP.md,
# REL-03/REL-13 — only the PyPI project owner can do these, so they cannot be
# automated here):
#   1. Register `ledger-archive` as a PyPI project (first publish of a
#      never-before-published name still requires a one-time manual `Add a new
#      pending publisher` on pypi.org, or an initial manual upload).
#   2. Add a Trusted Publisher on pypi.org for this project pointing at
#      `ChelseaKR/ledger`, workflow `release.yml`, environment `pypi`.
#   3. Create a GitHub Environment named `pypi` in repo Settings (recommended by
#      PyPI's Trusted Publishing guide so publish approval/URL is scoped and
#      auditable) — see `docs/adr/` if a protection-rule ADR is warranted.
# Until those exist, `publish-pypi` below will fail with an OIDC/audience error;
# the jobs upstream of it (verify, build, SBOM, cosign signing, SLSA provenance)
# work with no additional setup, while `verify-published` and the GitHub Release
# are gated behind the publish and so wait for the one-time setup too.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing signed stable SemVer tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # One release in flight per tag; never cancel a partially-published release
  # out from under itself.
  group: release
  cancel-in-progress: false

jobs:
  verify:
    name: verify (tag · changelog · full merge gate)
    runs-on: ubuntu-latest
    outputs:
      release_commit: ${{ steps.tag.outputs.commit }}
      release_tag: ${{ steps.tag.outputs.tag }}
      tag_object_sha: ${{ steps.tag.outputs.tag_object_sha }}
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 0
      - name: Resolve and verify the reviewed signed tag (REL-08)
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG}"
          test "${GITHUB_REF}" = refs/heads/main
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test "$(git rev-parse origin/main)" = "${GITHUB_SHA}"
          [[ "${TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          test "$(git cat-file -t "refs/tags/${TAG}")" = tag
          RELEASE_COMMIT="$(git rev-parse --verify "${TAG}^{commit}")"
          git merge-base --is-ancestor "${RELEASE_COMMIT}" origin/main
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "${GITHUB_WORKSPACE}/.github/allowed_signers"
          git verify-tag -- "${TAG}"
          {
            echo "tag=${TAG}"
            echo "commit=${RELEASE_COMMIT}"
            echo "tag_object_sha=$(git rev-parse "refs/tags/${TAG}")"
          } >> "${GITHUB_OUTPUT}"
          git checkout --detach "${RELEASE_COMMIT}"
      # REL-10: a release must have release notes. A vX.Y.Z tag whose version has
      # no matching `## [X.Y.Z]` section in CHANGELOG.md is a cut-from-the-wrong-
      # state mistake — fail before building, not after publishing.
      - name: CHANGELOG has a section for this version (REL-10)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          if ! grep -Fq "## [${VERSION}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${VERSION}]' section for tag ${TAG}"
            exit 1
          fi
          echo "CHANGELOG.md has a section for ${VERSION}"
      # No dependency caching anywhere in this workflow: it ends in a real
      # publish (PyPI + GitHub Release), and Actions' caches are fillable by any
      # workflow run in the repo — restoring one into the pipeline that ships
      # artifacts is a cache-poisoning vector a build-only CI job doesn't have.
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          python-version: "3.12"
          enable-cache: false
      - name: Install (locked)
        run: uv sync --locked --group dev
      # REL-14: a tag is a promise of a working release; re-run the *complete*
      # merge gate (`make verify` == lint, type, test, i18n, accessibility,
      # pip-audit, secret-scan, claims — exactly CI's required-check set) against
      # the tagged commit rather than trusting that main was green when the tag
      # was cut, and rather than a hand-picked subset that could ship what
      # ordinary CI would block.
      - name: Full merge gate at the tagged commit (make verify)
        run: make verify

  build:
    name: build sdist + wheel
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.release_commit }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel (hatchling)
        run: python -m build
      - name: Wheel contains the public stylesheet
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheel = glob.glob("dist/*.whl")
          if len(wheel) != 1:
              raise SystemExit(f"expected one wheel, found {wheel}")
          with zipfile.ZipFile(wheel[0]) as archive:
              if "ledger/static/app.css" not in archive.namelist():
                  raise SystemExit("wheel is missing ledger/static/app.css")
          PY
      # Integrity: a tag that doesn't match the package's own declared version is
      # almost always a cut-from-the-wrong-commit mistake, not an intentional
      # release — fail loudly instead of publishing a mislabeled artifact.
      - name: Tag must match package version
        id: version
        env:
          TAG: ${{ needs.verify.outputs.release_tag }}
        run: |
          set -euo pipefail
          # This job only installs the `build` frontend, not the package itself, so
          # the version comes straight from pyproject.toml (the single source of
          # version truth, per RELEASE-AND-VERSIONING-STANDARD §2) rather than
          # `importlib.metadata`, which has nothing installed to introspect here.
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG_VERSION="${TAG#v}"
          echo "package version: $PKG_VERSION"
          echo "tag version:     $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  sbom:
    name: SBOM (CycloneDX)
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # actions/attest-sbom mints a Sigstore-backed attestation
      attestations: write     # actions/attest-sbom writes the SBOM attestation record
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.release_commit }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      # Install exactly what ships (the built wheel, no dev extras) into an
      # isolated tree so the SBOM reflects the *shipped* dependency closure
      # (cryptography + transitive), not the dev toolchain sitting alongside it.
      - name: Materialize the shipped dependency closure
        run: |
          python -m pip install --upgrade pip
          pip install --target sbom-root dist/*.whl
      - name: Generate CycloneDX SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: sbom-root
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false
      # SLSA/SEC-35-37: bind the SBOM to the exact release artifacts with a
      # GitHub-native, Sigstore-backed attestation (verifiable with
      # `gh attestation verify`), independent of the cosign detached signatures
      # produced in the sign job.
      - name: Attest SBOM -> dist artifacts
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4.1.0
        with:
          subject-path: "dist/*"
          sbom-path: sbom.cyclonedx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.cyclonedx.json
          if-no-files-found: error

  provenance:
    name: SLSA build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write         # exchanged for a Sigstore signing identity (OIDC, keyless)
      attestations: write     # actions/attest-build-provenance writes the SLSA provenance record
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      # GitHub-native SLSA v1 build provenance (REL-17/REL-20): records the
      # workflow, commit, and trigger that produced these exact artifact
      # digests, signed keylessly via Sigstore and stored in the transparency
      # log — verifiable with `gh attestation verify dist/<file> -R ChelseaKR/ledger`.
      - name: Attest build provenance -> dist artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: "dist/*"

  sign:
    name: cosign sign (keyless)
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # cosign's keyless signing exchanges this OIDC token for a short-lived Fulcio cert
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom
          path: sbom
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
      # Detached, keyless (no long-lived signing key to steward or rotate)
      # signatures over the sdist, wheel, and SBOM, recorded in the public
      # Rekor transparency log — same trust model as SLSA/SBOM attestations
      # above, published in the format (`.sig`/`.pem`/`.crt`) most tools that
      # already speak plain cosign (not GitHub attestations) expect.
      - name: Sign release artifacts
        run: |
          set -euo pipefail
          mkdir -p signatures
          for f in dist/*.tar.gz dist/*.whl sbom/sbom.cyclonedx.json; do
            base="$(basename "$f")"
            cosign sign-blob --yes \
              --output-signature "signatures/${base}.sig" \
              --output-certificate "signatures/${base}.pem" \
              "$f"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: signatures
          path: signatures/
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI (Trusted Publishing)
    needs: [verify, build, sbom, provenance, sign]
    runs-on: ubuntu-latest
    environment:
      # PyPI's Trusted Publishing guide recommends scoping the publish to a
      # GitHub Environment so it's independently auditable/protectable
      # (required reviewers, wait timer) from the repo's Settings — the
      # environment itself must be created once by the repo owner; see the
      # header comment above.
      name: pypi
      url: https://pypi.org/project/ledger-archive/${{ needs.build.outputs.version }}/
    permissions:
      contents: read
      id-token: write   # OIDC token exchanged for a short-lived PyPI API token — no stored secret, REL-13
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - name: Recheck immutable tag object before PyPI publication
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.release_tag }}
          TAG_OBJECT_SHA: ${{ needs.verify.outputs.tag_object_sha }}
        run: |
          set -euo pipefail
          LIVE_TAG_OBJECT="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.sha)"
          test "${LIVE_TAG_OBJECT}" = "${TAG_OBJECT_SHA}"
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist
          print-hash: true

  verify-published:
    name: verify PyPI serves what was built
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      # REL-16: publishing is not the finish line — *serving* is. Download every
      # file PyPI now lists for this version and compare its sha256 against the
      # artifact this run built; a mismatch or a missing/extra file fails the
      # release. Retries cover PyPI's propagation delay after upload.
      - name: Downloaded-from-PyPI artifacts match the built ones (REL-16)
        env:
          # Env-var indirection rather than inline `${{ }}` expansion in the
          # script (zizmor template-injection hygiene).
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          python - "$VERSION" <<'EOF'
          import hashlib
          import json
          import pathlib
          import sys
          import time
          import urllib.request

          version = sys.argv[1]
          local = {
              p.name: hashlib.sha256(p.read_bytes()).hexdigest()
              for p in pathlib.Path("dist").iterdir()
              if p.is_file()
          }
          url = f"https://pypi.org/pypi/ledger-archive/{version}/json"
          data = None
          for attempt in range(1, 11):
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      data = json.load(response)
                  break
              except Exception as exc:  # propagation delay: retry, then fail loudly
                  print(f"PyPI metadata not served yet ({exc}); attempt {attempt}/10")
                  time.sleep(30)
          if data is None:
              sys.exit(f"PyPI never served metadata for ledger-archive=={version}")
          served = {}
          for entry in data["urls"]:
              with urllib.request.urlopen(entry["url"], timeout=120) as response:
                  served[entry["filename"]] = hashlib.sha256(response.read()).hexdigest()
          missing = sorted(set(local) - set(served))
          extra = sorted(set(served) - set(local))
          if missing or extra:
              sys.exit(f"file-set mismatch: not on PyPI {missing}; not built here {extra}")
          for name in sorted(local):
              if served[name] != local[name]:
                  sys.exit(
                      f"digest mismatch for {name}: built {local[name]}, PyPI serves {served[name]}"
                  )
              print(f"verified {name} sha256={local[name]}")
          print("PyPI serves exactly what this run built")
          EOF

  github-release:
    name: publish GitHub Release
    # verify-published gates the public release page: it only appears once PyPI
    # is confirmed to serve exactly the bytes this run built.
    needs: [verify, build, sbom, provenance, sign, publish-pypi, verify-published]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # `gh release create` needs to create the Release + upload assets
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: release-assets
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom
          path: release-assets
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: signatures
          path: release-assets
      # Accountability/auditability: every asset a consumer needs to verify the
      # release end to end (the sdist/wheel PyPI got, the SBOM, the cosign
      # detached signatures) ships as GitHub Release assets too, alongside the
      # GitHub-native attest-sbom/attest-build-provenance attestations recorded
      # above (`gh attestation verify`). The runner's own `gh` CLI does this in
      # one auditable command — one less third-party action in the release path
      # (zizmor superfluous-actions). `--verify-tag` refuses to invent a release
      # for a tag that no longer exists; the un-nullglobbed `release-assets/*`
      # makes gh fail loudly if the assets are missing rather than shipping an
      # empty release.
      - name: Publish GitHub Release with verification assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.release_tag }}
          TAG_OBJECT_SHA: ${{ needs.verify.outputs.tag_object_sha }}
        run: |
          set -euo pipefail
          LIVE_TAG_OBJECT="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.sha)"
          test "${LIVE_TAG_OBJECT}" = "${TAG_OBJECT_SHA}"
          gh release create "${TAG}" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
