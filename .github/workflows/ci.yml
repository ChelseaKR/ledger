name: ci

# Agility: every push and PR runs the full merge gate. Reproducibility: the gate is
# the same `make` targets a contributor runs locally, on a pinned toolchain.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege (securability): grant read-only by default; jobs widen only what
# they need.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint · type · test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Compatibility: the full supported interpreter range runs on pushes to main
        # and on manual dispatch; pull requests exercise only the canonical version to
        # save Actions minutes, since the merge to main re-runs the full matrix.
        python: ${{ (github.event_name == 'pull_request') && fromJSON('["3.12"]') || fromJSON('["3.11", "3.12"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Type check (mypy strict)
        run: mypy
      - name: Test with coverage
        run: pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: coverage.xml

  no-outing-audit:
    name: no-outing audit (safety gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # This gate runs the disclosure tests on their own so a regression in the
      # core safety guarantee is unmistakable in the checks list, not buried.
      - name: Contributor identity never leaks
        run: pytest -m disclosure -q

  accessibility:
    name: accessibility gate (WCAG 2.2 AA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Static accessibility checks (landmarks, labels, lang, alt text, contrast
      # tokens) run with no browser. The full axe + manual screen-reader review is
      # documented in docs/accessibility/ and recorded in the committed ACR.
      - name: Static a11y checks on the web surface
        run: python -m ledger.accessibility_check web

  supply-chain:
    name: dependency & secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Vulnerable dependency scan (pip-audit)
        run: pip-audit -r <(pip freeze)
      - name: Secret scan (gitleaks)
        # Run the pinned gitleaks binary directly. The gitleaks-action v2 crashes
        # on pull_request events (internal GitHub API RequestError) before it ever
        # scans; the binary is deterministic and honours .gitleaks.toml.
        run: |
          GL=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --exit-code 1
