name: ci

# Agility: every push and PR runs the full merge gate. Reproducibility: the gate is
# the same `make` targets a contributor runs locally, on a pinned toolchain.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege (securability): grant read-only by default; jobs widen only what
# they need.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint · type · test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Compatibility: 3.12 is the floor (CODE-QUALITY-STANDARD CQ-01) and, for
        # now, the ceiling too, so the matrix is a single interpreter.
        python: ["3.12"]
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      # SEC-13/CQ-09/CQ-27: install from the committed, hash-locked `uv.lock`
      # (`--locked` fails the build rather than silently re-resolving) instead of
      # an unpinned `pip install -e ".[dev]"` against version ranges — the same
      # exact dependency graph on every contributor's machine and in CI.
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Install
        run: uv sync --locked --group dev
      - name: Lint (ruff)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
      - name: Type check (mypy strict)
        run: uv run mypy
      - name: Test with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml
      # Per-module floor (CODE-QUALITY-STANDARD, security/crypto-critical paths):
      # the access-policy, consent, and dual-control modules must hold >=95%
      # branch coverage, above the 85% baseline. Mirrors `make cov`.
      - name: Per-module coverage floor (access/consent/dual-control >=95%)
        run: uv run coverage report --include="src/ledger/access/*,src/ledger/consent.py,src/ledger/dualcontrol.py" --fail-under=95
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: coverage.xml

  i18n:
    name: i18n (gettext catalog gate)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      # msgfmt (G7 PO-compilation gate) is a system gettext binary, not a pip
      # dependency — installed here just like the supply-chain job installs a
      # non-pip scanner. babel/pybabel come from the locked `dev` group below.
      - name: Install gettext (msgfmt)
        run: sudo apt-get update && sudo apt-get install -y gettext
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --group dev
      # Exactly what `make verify` runs locally (no local/CI drift): G2-lite (POT
      # committed & current), G7 (msgfmt --check), G6/G5 (EN/ES key-parity +
      # completeness + placeholder parity), G3 (BCP 47 tag validity).
      - name: i18n catalog gate (make i18n)
        run: make i18n

  no-outing-audit:
    name: no-outing audit (safety gate)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --group dev
      # This gate runs the disclosure tests on their own so a regression in the
      # core safety guarantee is unmistakable in the checks list, not buried.
      - name: Contributor identity never leaks
        run: uv run pytest -m disclosure -q

  accessibility:
    name: accessibility gate (WCAG 2.2 AA)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --group dev
      # Static accessibility checks (landmarks, labels, lang, alt text, contrast
      # tokens) run with no browser. The full axe + manual screen-reader review is
      # documented in docs/accessibility/ and recorded in the committed ACR.
      - name: Static a11y checks on the web surface
        run: uv run python -m ledger.accessibility_check web

  supply-chain:
    name: dependency & secret scan
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          python-version: "3.12"
          enable-cache: true
      # Audit exactly the graph pinned in `uv.lock` (`--locked` fails rather than
      # re-resolving), not whatever an unpinned `pip install pip-audit` happens to
      # pull that day — the scan target and the shipped lockfile are now the same
      # artifact (SEC-13).
      - run: uv sync --locked --group dev
      - name: Vulnerable dependency scan (pip-audit)
        run: uv run pip-audit
      - name: Secret scan (gitleaks)
        # Run the pinned gitleaks binary directly. The gitleaks-action v2 crashes
        # on pull_request events (internal GitHub API RequestError) before it ever
        # scans; the binary is deterministic and honours .gitleaks.toml.
        run: |
          GL=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --exit-code 1

  container:
    name: container image CVE scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Build the self-host image
        run: docker build -f infra/Dockerfile -t ledger:ci-scan .
      # SEC-28 / REL-18 (Tier-1 gate): block on any fixable CRITICAL/HIGH CVE in
      # the image ledger tells communities to self-host with. `ignore-unfixed`
      # keeps the gate meaningful (no vendor patch means no action a maintainer
      # can take yet) rather than permanently red on upstream backlog.
      - name: Scan for CRITICAL/HIGH CVEs (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ledger:ci-scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
