name: ci

# Agility: every push and PR runs the full merge gate. Reproducibility: the gate is
# the same `make` targets a contributor runs locally, on a pinned toolchain.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege (securability): grant read-only by default; jobs widen only what
# they need.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint · type · test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Compatibility: the full supported interpreter range runs on pushes to main
        # and on manual dispatch; pull requests exercise only the canonical version to
        # save Actions minutes, since the merge to main re-runs the full matrix.
        python: ${{ (github.event_name == 'pull_request') && fromJSON('["3.12"]') || fromJSON('["3.11", "3.12"]') }}
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde  # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Type check (mypy strict)
        run: mypy
      - name: Test with coverage
        run: pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: coverage.xml

  i18n:
    name: i18n (gettext catalog gate)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde  # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      # msgfmt (G7 PO-compilation gate) is a system gettext binary, not a pip
      # dependency — installed here just like the supply-chain job installs a
      # non-pip scanner. babel/pybabel come from the dev extras below.
      - name: Install gettext (msgfmt)
        run: sudo apt-get update && sudo apt-get install -y gettext
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Exactly what `make verify` runs locally (no local/CI drift): G2-lite (POT
      # committed & current), G7 (msgfmt --check), G6/G5 (EN/ES key-parity +
      # completeness + placeholder parity), G3 (BCP 47 tag validity).
      - name: i18n catalog gate (make i18n)
        run: make i18n

  no-outing-audit:
    name: no-outing audit (safety gate)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde  # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # This gate runs the disclosure tests on their own so a regression in the
      # core safety guarantee is unmistakable in the checks list, not buried.
      - name: Contributor identity never leaks
        run: pytest -m disclosure -q

  accessibility:
    name: accessibility gate (WCAG 2.2 AA)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde  # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Static accessibility checks (landmarks, labels, lang, alt text, contrast
      # tokens) run with no browser. The full axe + manual screen-reader review is
      # documented in docs/accessibility/ and recorded in the committed ACR.
      - name: Static a11y checks on the web surface
        run: python -m ledger.accessibility_check web

  supply-chain:
    name: dependency & secret scan
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde  # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Vulnerable dependency scan (pip-audit)
        run: pip-audit -r <(pip freeze)
      - name: Secret scan (gitleaks)
        # Run the pinned gitleaks binary directly. The gitleaks-action v2 crashes
        # on pull_request events (internal GitHub API RequestError) before it ever
        # scans; the binary is deterministic and honours .gitleaks.toml.
        run: |
          GL=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --exit-code 1

  workflow-lint:
    name: workflow linter (zizmor)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde  # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # CICD-19: static analysis of the workflow YAML itself — injection via
      # untrusted `${{ }}` expansion into `run:` blocks, missing
      # `persist-credentials: false`, overbroad `permissions:`, and similar
      # workflow-authoring mistakes that neither CodeQL's actions-language
      # analysis (structural/data-flow, added in codeql.yml — CICD-20) nor
      # ruff's Python-source scanning cover. Run without `--gh-token`
      # (offline audits only): the two online-only audits it skips
      # (known-vulnerable-actions, ref-version-mismatch) both boil down to
      # "is this pinned action's SHA current", which Dependabot
      # (.github/dependabot.yml) already tracks and opens PRs for — this job
      # is about catching authoring mistakes, not duplicating that gate.
      - name: Workflow static analysis (zizmor)
        run: zizmor .github/workflows

  container:
    name: container image CVE scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): observe/audit egress before anything else runs.
      # Recording in audit mode first (per the standard's rollout guidance) so the
      # allowlist can be derived from real traffic before flipping to `block`,
      # rather than guessing an allowlist and breaking the build.
      - uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde  # v2.9.1
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Build the self-host image
        run: docker build -f infra/Dockerfile -t ledger:ci-scan .
      # SEC-28 / REL-18 (Tier-1 gate): block on any fixable CRITICAL/HIGH CVE in
      # the image ledger tells communities to self-host with. `ignore-unfixed`
      # keeps the gate meaningful (no vendor patch means no action a maintainer
      # can take yet) rather than permanently red on upstream backlog.
      - name: Scan for CRITICAL/HIGH CVEs (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ledger:ci-scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
