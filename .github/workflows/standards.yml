# Standards check — fetches the PINNED portfolio-standards at build time and
# runs the freshness gate. Nothing from portfolio-standards is committed into
# this repo; the standards exist only on the runner (.standards/, gitignored).
#
# Requires the repo secret STANDARDS_DEPLOY_KEY (the read-only deploy key's
# private half). Installed by automation/ci-fetch/install.sh.
name: standards

# pull_request is intentionally omitted: fork PRs do not receive repo secrets, so the
# private-standards fetch (deploy key) would fail for external contributors once this
# repo is public. The freshness gate is a maintainer concern, enforced on every push to main.
on:
  push:
    branches: [main]

# Least privilege: this job only reads. No write scope is granted to GITHUB_TOKEN.
permissions:
  contents: read

concurrency:
  group: standards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standards:
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): audit mode first, see ci.yml for the rollout note.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out this repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Fetch pinned standards (private, read-only deploy key)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ChelseaKR/portfolio-standards
          ref: v1.0.1                      # bump in lockstep with .standards-version
          ssh-key: ${{ secrets.STANDARDS_DEPLOY_KEY }}
          path: .standards
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Standards freshness gate
        run: python3 .standards/automation/check_staleness.py --standards-dir .standards
