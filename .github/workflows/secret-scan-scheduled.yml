name: scheduled-secret-scan

# SEC-19: gitleaks in ci.yml scans the full checkout on every push and PR, but it
# only ever runs against the commits in that trigger's context. This job
# independently re-scans the entire git history (every commit, every branch tip)
# with a different engine (TruffleHog) on a schedule, so a secret that slipped
# past gitleaks -- or was committed before either scanner existed -- is still
# caught even with no new code change (security-aware maintenance, same rationale
# as the codeql.yml weekly run).
on:
  schedule:
    - cron: "13 5 * * 3" # Wednesdays, 05:13 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-secret-scan
  cancel-in-progress: true

jobs:
  trufflehog:
    name: full-history secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      # Harden-Runner (SEC-04): audit mode first, see ci.yml for the rollout note.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Full-history secret scan (trufflehog)
        # Run the pinned trufflehog binary directly rather than the third-party
        # trufflehog-actions-scan / trufflesecurity/trufflehog GitHub Action, for
        # the same reason ci.yml runs the gitleaks binary directly: a pinned,
        # deterministic binary invocation instead of an unpinned Action tag.
        # `git file://.` with no --since-commit/--branch walks every commit
        # reachable from every ref in the checkout, i.e. the full history, not
        # just the current tip. --results=verified,unknown excludes the
        # low-confidence "unverified" tier so known placeholder test fixtures
        # (see .gitleaks.toml) don't need a parallel allowlist here.
        run: |
          TH=3.95.8
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TH}/trufflehog_${TH}_linux_amd64.tar.gz" | tar -xz -C /tmp trufflehog
          /tmp/trufflehog git file://. \
            --results=verified,unknown \
            --fail \
            --no-update
