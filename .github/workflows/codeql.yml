name: codeql

# Vulnerability management: static security analysis on every pull request into main
# and on a weekly schedule, so a newly-discovered class of bug is caught even with no
# code change (security-aware maintenance). The post-merge push run is redundant with
# the pull-request run and is dropped to save Actions minutes.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # Mondays, 04:27 UTC

permissions:
  contents: read

# Cancel a superseded analysis when a PR branch is updated; the latest revision is
# the only one whose result the merge gate cares about.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      # Harden-Runner (SEC-04): audit mode first, see ci.yml for the rollout note.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
